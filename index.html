<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA de Cômodos - Mobile</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #image-preview { max-width: 100%; height: auto; margin-top: 15px; border-radius: 10px; }
        #label-container { margin-top: 20px; font-weight: bold; font-size: 1.2em; }
        .loading { color: gray; }
    </style>
</head>
<body>

    <h2>Detector de Cômodos</h2>
    <p id="status" class="loading">Carregando inteligência artificial...</p>

    <input type="file" accept="image/*" capture="environment" id="file-input" style="display:none;" onchange="predictFromFile(event)">
    
    <button id="btn-foto" onclick="document.getElementById('file-input').click()" disabled>
        Tirar Foto do Cômodo
    </button>

    <div id="container">
        <img id="image-preview" src="" style="display:none;">
    </div>
    
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        // Link do seu modelo (mantenha o seu link aqui)
        const URL = "https://teachablemachine.withgoogle.com/models/9sJclF37o/";

        let model, labelContainer, maxPredictions;

        async function init() {
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
                
                document.getElementById("status").innerText = "IA Pronta!";
                document.getElementById("btn-foto").disabled = false;
                labelContainer = document.getElementById("label-container");
            } catch (e) {
                document.getElementById("status").innerText = "Erro ao carregar modelo. Verifique a internet.";
            }
        }

        async function predictFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const imgElement = document.getElementById("image-preview");
            imgElement.src = window.URL.createObjectURL(file);
            imgElement.style.display = "inline-block";

            imgElement.onload = async () => {
                const prediction = await model.predict(imgElement);
                labelContainer.innerHTML = "";
                
                prediction.forEach(p => {
                    const percent = (p.probability * 100).toFixed(0);
                    const pElement = document.createElement("div");
                    pElement.innerHTML = `${p.className}: ${percent}%`;
                    
                    // Destaca o resultado com mais de 80%
                    if (p.probability > 0.8) pElement.style.color = "green";
                    
                    labelContainer.appendChild(pElement);
                });
            };
        }

        init();
    </script>
</body>
</html>

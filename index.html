<div>Teachable Machine Image Model - Narrador de Ambientes</div>
<button type="button" onclick="init()">Começar Câmera e Voz</button>
<div id="webcam-container"></div>
<div id="label-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/f7KpBSET4/";

    let model, webcam, labelContainer, maxPredictions;
    let ultimaFala = 0; // Controla o intervalo de 1 segundo

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // Configuração da câmera (ajustado para mobile)
        const flip = true; 
        webcam = new tmImage.Webcam(300, 300, flip); 
        await webcam.setup({ facingMode: "environment" }); // Tenta usar a câmera traseira se possível
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        
        let maiorProb = 0;
        let localVencedor = "";

        for (let i = 0; i < maxPredictions; i++) {
            const prob = prediction[i].probability;
            const nomeClasse = prediction[i].className;
            
            labelContainer.childNodes[i].innerHTML = nomeClasse + ": " + prob.toFixed(2);

            // Lógica para encontrar o local atual
            if (prob > maiorProb) {
                maiorProb = prob;
                localVencedor = nomeClasse;
            }
        }

        // Lógica da Voz: Fala a cada 1000ms (1 segundo) 
        // Apenas se a confiança for maior que 85% para evitar erros
        let agora = Date.now();
        if (agora - ultimaFala > 1000 && maiorProb > 0.85) {
            falar(localVencedor);
            ultimaFala = agora;
        }
    }

    function falar(texto) {
        // Cancela falas anteriores para não encavalar
        window.speechSynthesis.cancel(); 
        const msg = new SpeechSynthesisUtterance();
        msg.text = texto;
        msg.lang = 'pt-BR';
        msg.rate = 1.2; // Velocidade um pouco mais rápida para fluidez
        window.speechSynthesis.speak(msg);
    }
</script>
